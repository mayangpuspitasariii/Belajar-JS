<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="color">
            <h1>My Website</h1>
        <h2 id="mode">Light Mode</h2>

        <div class="btn">
             <button id="dark">Dark Mode</button>
            <button id="red">Red Mode</button>
            <button id="reset">Reset</button>
        </div>
        

        <div class="perhitungan">
               <div class="input">
                 <input type="number" id="inputSatu">
                <input type="number" id="inputDua">
                 <input type="int" id="inputHasil" disabled>
                
               </div>
            <div class="arit">
                <button id="tambah" class="tambah">+</button>
                <button id="bagi" class="bagi">/</button>
                <button id="kali" class="kali">X</button>
                <button id="kurang" class="kurang">-</button>
            </div>
      
        </div>
       
    </div>
    </div>
    <script src="main.js"></script>
</body>
